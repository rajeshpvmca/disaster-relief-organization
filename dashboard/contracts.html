<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agreements</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { background-color: transparent; padding: 1.5rem; color: var(--text-primary); }
        .content-card {
            background: rgba(11, 17, 32, 0.6); backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 1rem; padding: 1.5rem; margin-bottom: 1.5rem;
        }
        .contract-item { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); padding: 1.25rem; border-radius: 10px; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <div class="d-flex justify-content-between align-items-end mb-4 flex-wrap gap-3">
            <div>
                <h2 class="fw-bold mb-1 d-flex align-items-center gap-2">
                    <span class="material-symbols-outlined text-secondary" style="font-size: 2rem;">history_edu</span>
                    Active Agreements
                </h2>
                <p class="text-white-50 mb-0 font-monospace small">COMPLIANCE: <span class="text-success">VERIFIED</span></p>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-12 col-md-8 mx-auto">
                <div class="content-card">
                    <h5 class="fw-bold mb-4 border-bottom border-secondary pb-3">Legal & SLA Documents</h5>
                    
                    <div class="contract-item d-flex justify-content-between align-items-center">
                        <div class="d-flex align-items-center gap-3">
                            <span class="material-symbols-outlined fs-2 text-primary">description</span>
                            <div>
                                <h6 class="text-white mb-0">Master Services Agreement (MSA)</h6>
                                <span class="text-white-50 small">Signed: Jan 10, 2024 • Valid until: Jan 10, 2026</span>
                            </div>
                        </div>
                        <button class="btn btn-sm btn-glass text-white px-3">Download</button>
                    </div>

                    <div class="contract-item d-flex justify-content-between align-items-center mb-0">
                        <div class="d-flex align-items-center gap-3">
                            <span class="material-symbols-outlined fs-2 text-warning">handshake</span>
                            <div>
                                <h6 class="text-white mb-0">Service Level Agreement - Logistics Tier 1</h6>
                                <span class="text-white-50 small">Signed: Feb 05, 2024 • Valid until: Feb 05, 2025</span>
                            </div>
                        </div>
                        <button class="btn btn-sm btn-glass text-white px-3">Download</button>
                    </div>

                </div>
            </div>
        </div>
    </div>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // Mock link handler for danger zone buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                window.top.location.href = '../404.html';
            });
        });
    });
    </script>
</body>
</html>
