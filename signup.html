<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Register | Stackly</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Atkinson+Hyperlegible+Next:wght@400;500;700&family=Geist:wght@400;500&display=swap" rel="stylesheet" />
    <!-- Material Symbols & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Font Awesome for Form Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />

    <link rel="stylesheet" href="css/style.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
            position: relative;
            background-color: var(--bs-body-bg);
            overflow-x: hidden;
        }

        /* Full Screen Background */
        .auth-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: url('./assets/images/img_17.webp') center/cover no-repeat;
            z-index: -2;
            filter: brightness(0.3);
        }

        .auth-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, rgba(11,17,32,0.85) 0%, rgba(11,17,32,0.98) 100%);
            z-index: -1;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.02) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3) !important;
            overflow: hidden;
        }

        .unique-role-selector {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .unique-role-item {
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px 5px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
            text-align: center;
        }

        .unique-role-item i {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
            margin-bottom: 5px;
        }

        .unique-role-item .role-text {
            font-weight: 700;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        @media (max-width: 576px) {
            .unique-role-selector {
                gap: 5px;
            }
            .unique-role-item {
                padding: 10px 2px;
                border-radius: 8px;
            }
            .unique-role-item i {
                font-size: 1.2rem;
            }
            .unique-role-item .role-text {
                font-size: 0.6rem;
                letter-spacing: 0;
            }
        }

        .btn-check:checked + .unique-role-item {
            background: rgba(0, 240, 255, 0.1);
            border-color: transparent;
            box-shadow: 0 8px 25px rgba(0, 240, 255, 0.15);
            transform: translateY(-4px) scale(1.02);
        }

        .btn-check:checked + .unique-role-item::before {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: 12px;
            padding: 1px;
            background: linear-gradient(135deg, var(--accent-color), rgba(0, 240, 255, 0.3), var(--accent-color));
            background-size: 200% 200%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: borderGlow 3s ease infinite;
            z-index: -1;
        }

        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .btn-check:checked + .unique-role-item i {
            color: var(--accent-color);
            transform: scale(1.1);
            animation: iconPulse 1.5s infinite alternate;
        }
        
        .btn-check:checked + .unique-role-item .role-text {
            color: #ffffff;
        }

        @keyframes iconPulse {
            0% { transform: scale(1.1); filter: drop-shadow(0 0 2px rgba(0, 240, 255, 0.3)); }
            100% { transform: scale(1.2); filter: drop-shadow(0 0 8px rgba(0, 240, 255, 0.6)); }
        }

        .unique-role-item:hover {
            border-color: rgba(0, 240, 255, 0.4);
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.08);
        }
        
        .unique-role-item:hover .role-text {
            color: #ffffff;
        }

        /* Floating Icons Animation */
        .floating-icons .hero-shape {
            position: absolute;
            color: var(--accent-color);
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
            transition: 0.3s;
            filter: drop-shadow(0 0 10px rgba(0, 240, 255, 0.3));
        }

        @keyframes iconDance {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            25% { transform: translateY(-25px) rotate(-20deg) scale(1.1); }
            50% { transform: translateY(5px) rotate(15deg) scale(0.9); }
            75% { transform: translateY(-15px) rotate(10deg) scale(1.05); }
        }
        @keyframes iconBounceTwirl {
            0%, 100% { transform: translateY(0) scale(1) rotate(0deg); }
            50% { transform: translateY(-40px) scale(1.2) rotate(180deg); }
        }
        @keyframes iconSway {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            50% { transform: translateX(30px) rotate(15deg) translateY(-10px); }
        }

        .hero-shape-1 { top: 10%; left: 5%; font-size: 60px; animation: iconDance 3.5s ease-in-out infinite; }
        .hero-shape-2 { top: 15%; right: 8%; font-size: 50px; animation: iconBounceTwirl 5s linear infinite; }
        .hero-shape-3 { bottom: 15%; left: 10%; font-size: 45px; animation: iconSway 4.5s ease-in-out infinite; }
        .hero-shape-4 { bottom: 20%; right: 12%; font-size: 55px; animation: iconDance 4s ease-in-out infinite 1s; }
        .hero-shape-5 { top: 45%; left: 3%; font-size: 35px; animation: iconBounceTwirl 6s linear infinite reverse; }
        .hero-shape-6 { top: 60%; right: 5%; font-size: 40px; animation: iconSway 5s ease-in-out infinite reverse; }
        .hero-shape-7 { bottom: 40%; left: 18%; font-size: 30px; animation: iconDance 3.8s ease-in-out infinite 0.5s; }
        .hero-shape-8 { top: 5%; left: 45%; font-size: 45px; animation: iconBounceTwirl 6.5s ease-in-out infinite; }

        /* Premium Input Styling */
        .auth-input-modern {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px;
            color: #ffffff !important;
            padding: 1rem 1.2rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1rem;
        }

        .auth-input-modern:focus {
            background: rgba(0, 240, 255, 0.05) !important;
            border-color: var(--accent-color) !important;
            box-shadow: 0 0 0 4px rgba(0, 240, 255, 0.1);
            transform: translateY(-2px);
        }

        .auth-input-modern::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        /* Fix for WebKit Autofill (Chrome/Edge) overwriting dark theme with white background */
        .auth-input-modern:-webkit-autofill,
        .auth-input-modern:-webkit-autofill:hover, 
        .auth-input-modern:-webkit-autofill:focus, 
        .auth-input-modern:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #151b2b inset !important; /* Matches a dark background */
            -webkit-text-fill-color: #ffffff !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        /* Animated Links */
        .auth-link {
            color: var(--accent-color) !important;
            transition: all 0.3s ease;
            position: relative;
            display: inline-block;
        }
        
        .auth-link:hover {
            color: #ffffff !important;
            transform: translateX(4px);
        }
        
        .auth-link-underline {
            color: var(--accent-color) !important;
            position: relative;
            transition: color 0.3s ease;
        }
        
        .auth-link-underline::after {
            content: '';
            position: absolute;
            width: 100%;
            transform: scaleX(0);
            height: 2px;
            bottom: -2px;
            left: 0;
            background-color: var(--accent-color);
            transform-origin: bottom right;
            transition: transform 0.3s ease-out;
        }
        
        .auth-link-underline:hover {
            color: #ffffff !important;
        }
        
        .auth-link-underline:hover::after {
            transform: scaleX(1);
            transform-origin: bottom left;
        }
        
        .toggle-password {
            border-color: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.6);
        }
        .toggle-password:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
    </style>
</head>

<body class="bg-modern-dark text-white">

    <div class="auth-bg"></div>
    <div class="auth-overlay"></div>

    <div class="floating-icons d-none d-md-block">
        <span class="material-symbols-outlined hero-shape hero-shape-1">medical_services</span>
        <span class="material-symbols-outlined hero-shape hero-shape-2">volunteer_activism</span>
        <span class="material-symbols-outlined hero-shape hero-shape-3">health_and_safety</span>
        <span class="material-symbols-outlined hero-shape hero-shape-4">water_drop</span>
        <span class="material-symbols-outlined hero-shape hero-shape-5">local_hospital</span>
        <span class="material-symbols-outlined hero-shape hero-shape-6">healing</span>
        <span class="material-symbols-outlined hero-shape hero-shape-7">support</span>
        <span class="material-symbols-outlined hero-shape hero-shape-8">warning</span>
    </div>

    <div class="container position-relative py-3" style="z-index: 5;">
        <div class="row justify-content-center">
            <div class="col-md-9 col-lg-7 col-xl-6">
                <div class="auth-card rounded-5 p-4 p-lg-5" data-aos="zoom-in">
                    
                    <div class="text-center mb-4">
                        <a href="index.html" class="small text-decoration-none auth-link mb-3 d-inline-block"><i
                                class="fas fa-arrow-left me-2"></i> Back to Home</a>
                        <h2 class="fw-bold text-white mb-2">Create an Account</h2>
                        <p class="text-white-50">Join Stackly and help make a difference.</p>
                    </div>

                    <form id="signupForm">
                        
                        <label class="form-label text-white-50 small fw-bold tracking-widest text-uppercase mb-3 d-block text-center">I am a</label>
                        <div class="unique-role-selector mb-4">
                            <input type="radio" class="btn-check" name="role" id="roleVolunteer"
                                value="Volunteer" checked autocomplete="off">
                            <label class="unique-role-item" for="roleVolunteer">
                                <i class="fas fa-hands-helping"></i>
                                <span class="role-text">Volunteer</span>
                            </label>

                            <input type="radio" class="btn-check" name="role" id="roleDonor"
                                value="Donor" autocomplete="off">
                            <label class="unique-role-item" for="roleDonor">
                                <i class="fas fa-hand-holding-heart"></i>
                                <span class="role-text">Donor</span>
                            </label>

                            <input type="radio" class="btn-check" name="role" id="rolePartner" value="Partner"
                                autocomplete="off">
                            <label class="unique-role-item" for="rolePartner">
                                <i class="fas fa-handshake"></i>
                                <span class="role-text">Partner</span>
                            </label>

                            <input type="radio" class="btn-check" name="role" id="roleAdmin" value="Admin"
                                autocomplete="off">
                            <label class="unique-role-item" for="roleAdmin">
                                <i class="fas fa-user-shield"></i>
                                <span class="role-text">Admin</span>
                            </label>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label text-white-50 small fw-bold tracking-widest text-uppercase">Full Name</label>
                                <input class="form-control auth-input-modern" type="text" id="name" placeholder="John Doe" pattern="[A-Za-z\s]+" oninput="this.value = this.value.replace(/[^A-Za-z\s]/g, '')" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-white-50 small fw-bold tracking-widest text-uppercase">Email Address</label>
                                <input class="form-control auth-input-modern" type="email" id="email" placeholder="name@stackly.com" required>
                            </div>
                        </div>

                        <div class="row g-3 mb-1">
                            <div class="col-md-6">
                                <label class="form-label text-white-50 small fw-bold tracking-widest text-uppercase">Password</label>
                                <div class="input-group">
                                    <input class="form-control auth-input-modern border-end-0" type="password" id="password" placeholder="Enter password" minlength="8" required>
                                    <button class="btn btn-outline-secondary toggle-password auth-input-modern border-start-0" type="button">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-white-50 small fw-bold tracking-widest text-uppercase">Confirm</label>
                                <div class="input-group">
                                    <input class="form-control auth-input-modern border-end-0" type="password" id="confirmPassword" placeholder="Confirm password" required>
                                    <button class="btn btn-outline-secondary toggle-password auth-input-modern border-start-0" type="button">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Strength bar -->
                        <div class="mb-1"
                            style="height:4px;border-radius:4px;background:rgba(255,255,255,0.1);overflow:hidden;">
                            <div id="strengthBar"
                                style="height:100%;width:0;transition:width 0.3s, background 0.3s;"></div>
                        </div>
                        <div id="matchMsg" style="font-size:0.75rem;min-height:1.1rem;margin-bottom:.75rem;"></div>

                        <div class="form-check mb-4 mt-2">
                            <input class="form-check-input bg-transparent border-accent focus-ring focus-ring-success" type="checkbox" id="terms" required>
                            <label class="form-check-label small text-white-50" for="terms">
                                I accept the <a href="404.html" class="fw-bold text-decoration-none auth-link-underline">Terms & Conditions</a>
                            </label>
                        </div>

                        <button class="btn btn-glow rounded-pill w-100 py-3 fw-bold mb-4 d-flex align-items-center justify-content-center gap-2">
                            Create Account <span class="material-symbols-outlined fs-5">person_add</span>
                        </button>

                        <p class="text-center mb-0 small text-white-50">Already have an account? <a
                                href="login.html" class="fw-bold text-decoration-none auth-link-underline">Login Here</a></p>
                    </form>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            AOS.init({
                duration: 1000,
                once: true
            });
        });

        // Live password strength + rules
        const pwdInput = document.getElementById('password');
        const confInput = document.getElementById('confirmPassword');
        const bar = document.getElementById('strengthBar');
        const matchMsg = document.getElementById('matchMsg');
        const rules = {
            'r-len': v => v.length >= 8,
            'r-upper': v => /[A-Z]/.test(v),
            'r-num': v => /[0-9]/.test(v),
            'r-sym': v => /[^A-Za-z0-9]/.test(v)
        };
        const colors = ['#ef4444', '#f97316', '#eab308', '#22C55E'];
        const labels = ['Weak', 'Fair', 'Good', 'Strong'];

        pwdInput.addEventListener('input', () => {
            const v = pwdInput.value;
            let passed = 0;
            Object.values(rules).forEach(fn => {
                if (fn(v)) passed++;
            });
            bar.style.width = (passed / 4 * 100) + '%';
            bar.style.background = colors[passed - 1] || 'rgba(255,255,255,0.1)';
            bar.title = labels[passed - 1] || '';
            checkMatch();
        });

        confInput.addEventListener('input', checkMatch);

        function checkMatch() {
            if (!confInput.value) { matchMsg.textContent = ''; return; }
            if (confInput.value === pwdInput.value) {
                matchMsg.style.color = '#22C55E';
                matchMsg.innerHTML = '<i class="fas fa-check-circle me-1"></i>Passwords match';
            } else {
                matchMsg.style.color = '#ef4444';
                matchMsg.innerHTML = '<i class="fas fa-times-circle me-1"></i>Passwords do not match';
            }
        }
        
        // Toggle Password visibility for both inputs
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const input = this.previousElementSibling;
                const icon = this.querySelector('i');
                if(input.type === 'password') {
                    input.type = 'text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            });
        });
    </script>

</body>

</html>
