<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Signal Lost | Disaster Relief Command</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        body {
            background-color: var(--bg-primary, #0B1120);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            overflow: hidden;
            position: relative;
            padding: 2rem;
        }

        /* Abstract Background Elements */
        .ambient-glow-1 {
            position: absolute;
            top: -20%;
            left: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            filter: blur(40px);
        }
        
        .ambient-glow-2 {
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            filter: blur(40px);
        }

        .error-card {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 650px;
            width: 100%;
            background: rgba(11, 17, 32, 0.65);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3.5rem 2rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(6, 182, 212, 0.05);
        }

        .error-code {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            margin: 0;
            background: var(--accent-gradient, linear-gradient(135deg, #06b6d4, #10b981));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            text-shadow: 0 0 40px rgba(6, 182, 212, 0.4);
        }

        .radar-box {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid rgba(6, 182, 212, 0.3);
            margin: 0 auto 1.5rem;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 20px rgba(6, 182, 212, 0.2);
            background: rgba(0,0,0,0.2);
        }

        .radar-box::before {
            content: '';
            position: absolute;
            width: 50%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #06b6d4);
            transform-origin: left center;
            animation: radarSweep 3s linear infinite;
            left: 50%;
        }

        @keyframes radarSweep {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .radar-box i, .radar-box span {
            font-size: 2.5rem;
            color: #ef4444;
            animation: pulseFade 2s infinite;
        }

        @keyframes pulseFade {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.9); text-shadow: 0 0 20px #ef4444; }
            100% { opacity: 1; transform: scale(1); }
        }

        .error-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
            color: #fff;
        }

        .error-desc {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 2.5rem;
            line-height: 1.6;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
        }

        .btn-group-custom {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-home {
            background: var(--accent-gradient, linear-gradient(135deg, #06b6d4, #10b981));
            color: #000;
            border: none;
            padding: 12px 32px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.05rem;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 25px rgba(6, 182, 212, 0.3);
        }

        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(6, 182, 212, 0.5);
            color: #000;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(6, 182, 212, 0.5);
            transform: translateY(-3px);
            color: #fff;
        }
        @media (max-width: 768px) {
            .error-card { padding: 2rem 1.5rem; }
            .error-code { font-size: 6rem; }
            .error-title { font-size: 1.75rem; }
            .btn-group-custom { flex-direction: column; width: 100%; }
            .btn-home, .btn-back { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>

    <div class="error-card">
        
        <div class="radar-box">
            <span class="material-symbols-outlined text-danger fs-1">satellite_alt</span>
        </div>

        <div>
            <h1 class="error-code">404</h1>
        </div>
        
        <h2 class="error-title">Signal Lost</h2>
        <p class="error-desc">
            We cannot establish a connection to this sector. The operational coordinates you requested are missing or restricted. 
        </p>

        <div class="btn-group-custom">
            <button onclick="history.back()" class="btn-back">
                <span class="material-symbols-outlined">arrow_back</span>
                Go Back
            </button>
            <a href="index.html" class="btn-home">
                <span class="material-symbols-outlined">rocket_launch</span>
                Back to Home
            </a>
        </div>

    </div>

</body>
</html>
